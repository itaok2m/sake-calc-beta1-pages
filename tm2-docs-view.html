<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#2a5c3f"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./icons/icon-192.png"/>
<meta name="application-name" content="酒造ツール"/>
<title>タンク登録詳細 / ベータ1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;background:#f4f4f3;color:#17211b;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
button{font:inherit;}
.page{max-width:860px;margin:0 auto;padding:18px 16px 56px;padding-bottom:max(56px, calc(env(safe-area-inset-bottom) + 24px));display:grid;gap:0;}
.nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:14px 16px;padding-top:max(20px, calc(env(safe-area-inset-top) + 16px));padding-bottom:14px;background:rgba(250,250,249,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(216,216,213,.9);}
.back-btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 16px;border-radius:16px;border:1.5px solid #d7ddd7;background:#fff;color:#445047;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(35,78,55,.10);}
.back-btn:active{transform:translateY(1px);box-shadow:0 3px 10px rgba(53,88,66,.10);}
.nav-title{font-size:18px;font-weight:800;line-height:1.35;min-width:0;}
.card{padding:16px 0;display:grid;gap:10px;border:none;background:transparent;box-shadow:none;}
.card + .card{border-top:1px solid rgba(214,222,216,.88);}
.hero{padding-top:18px;gap:10px;}
.kicker{font-size:11px;font-weight:800;letter-spacing:.05em;color:#5c6a61;}
h1{font-size:25px;line-height:1.35;}
.lead,.body-text,.plain-note{font-size:14px;line-height:1.85;color:#445249;}
.hero-status{padding:12px 14px;border-radius:16px;border:1px solid #d8e2dc;background:#f7faf8;display:grid;gap:6px;}
.hero-status[hidden]{display:none !important;}
.hero-status.is-ok{border-color:#d6e4da;background:#f5faf6;}
.hero-status.is-caution{border-color:#e7d19a;background:#fffaf0;}
.hero-status-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hero-status-badge{display:inline-flex;align-items:center;justify-content:center;min-height:24px;padding:2px 9px;border-radius:999px;background:#e8f0ea;color:#244333;font-size:11px;font-weight:800;line-height:1.4;}
.hero-status.is-caution .hero-status-badge{background:#f3d89b;color:#6a4b00;}
.hero-status-title{font-size:14px;font-weight:800;line-height:1.6;color:#213429;}
.hero-status-note{font-size:13px;line-height:1.8;color:#516057;}
.hero-status.is-caution .hero-status-note{color:#5d4a11;}
.grid{display:grid;gap:0 18px;grid-template-columns:repeat(2,minmax(0,1fr));border-top:1px solid rgba(218,225,219,.88);}
.mini{padding:10px 2px 11px;border-radius:0;background:transparent;border:none;border-bottom:1px solid rgba(218,225,219,.88);display:grid;gap:2px;}
.label{font-size:12px;font-weight:800;line-height:1.6;color:#5b6a61;}
.value{font-size:16px;font-weight:800;line-height:1.6;color:#1d2f25;word-break:break-word;}
.section-title{font-size:18px;font-weight:800;line-height:1.4;color:#173425;}
.row-list{display:grid;gap:0;border-top:1px solid rgba(218,225,219,.88);}
.row{padding:11px 2px;border-radius:0;border:none;border-bottom:1px solid rgba(218,225,219,.88);background:transparent;display:grid;gap:4px;}
.row-title{font-size:14px;font-weight:800;line-height:1.6;color:#213429;}
.row-text{font-size:13px;line-height:1.85;color:#506057;}
.section-note{font-size:12px;line-height:1.8;color:#607066;}
.segment-table{display:grid;gap:0;border-top:1px solid rgba(218,225,219,.88);}
.segment-row{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:8px;padding:12px 2px;border-radius:0;border:none;border-bottom:1px solid rgba(218,225,219,.88);background:transparent;align-items:start;}
.segment-cell{display:grid;gap:2px;min-width:0;}
.segment-head{font-size:12px;font-weight:800;line-height:1.6;color:#5b6a61;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.segment-band{display:inline-flex;align-items:center;justify-content:center;min-height:22px;padding:1px 8px;border-radius:999px;background:#edf4ef;color:#284232;font-size:11px;font-weight:800;line-height:1.4;}
.segment-value{font-size:13px;line-height:1.75;color:#233229;word-break:break-word;}
.segment-alert{grid-column:1 / -1;margin-top:2px;padding-top:8px;border-top:1px dashed rgba(122,91,21,.26);font-size:12px;line-height:1.8;color:#5d4a11;}
.segment-row.is-caution{padding:12px 14px;border-radius:16px;border:1px solid #e7d19a;background:#fff6e3;margin:6px 0;}
.segment-row.is-caution .segment-band{background:#f3d89b;color:#6a4b00;}
.segment-row.is-caution .segment-head{color:#7a5b15;}
.segment-row.is-caution .segment-value{color:#5d4a11;font-weight:800;}
.footer-note{font-size:12px;line-height:1.85;color:#607066;}
[hidden]{display:none !important;}
@media(max-width:720px){
  .grid{grid-template-columns:1fr;}
  .mini{padding-left:0;padding-right:0;}
  .row{padding-left:0;padding-right:0;}
  .segment-row{grid-template-columns:1fr 1fr;padding-left:0;padding-right:0;}
  .segment-row.is-caution{padding-left:12px;padding-right:12px;}
  .nav{align-items:flex-start;}
}

/* 2026-04-18: gradient removal + darker neutral background */
body{
  background:#eeeeeb !important;
  background-image:none !important;
}
.nav{
  background:#f3f3f0 !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
  border-bottom:1px solid #ddddda !important;
}
.hero-status,
.hero-status.is-ok,
.hero-status.is-caution,
.segment-row.is-caution,
.segment-band,
.hero-status-badge,
.back-btn{
  background-image:none !important;
}
.back-btn{background-color:#ffffff !important;}
.hero-status,
.hero-status.is-ok{background-color:#eff0ec !important;}
.hero-status.is-caution,
.segment-row.is-caution{background-color:#f5efe0 !important;}
.segment-band{background-color:#e2e6e1 !important;}
.hero-status-badge{background-color:#e4e8e3 !important;}
.hero-status.is-caution .hero-status-badge,
.segment-row.is-caution .segment-band{background-color:#ecd29a !important;}

</style>
</head>
<body>
<div class="nav">
  <button class="back-btn" id="backToTm2" type="button">← 直前の2mm表へ戻る</button>
  <div class="nav-title">タンク登録詳細</div>
</div>
<div class="page">
  <section class="card hero">
    <div class="kicker">2mm表 / 確認画面</div>
    <div>
      <h1 id="page-title">タンク登録詳細</h1>
      <p class="lead">登録値・区間登録値・採用計算方式を確認します。</p>
    </div>
    <div class="hero-status" id="audit-hero" hidden>
      <div class="hero-status-row">
        <span class="hero-status-badge" id="audit-hero-badge">登録済み</span>
        <div class="hero-status-title" id="audit-hero-title">登録値の確認画面です。</div>
      </div>
      <div class="hero-status-note" id="audit-hero-note" hidden></div>
    </div>
  </section>
  <section class="card">
    <div class="section-title">登録値</div>
    <div class="grid">
      <div class="mini"><div class="label">タンク</div><div class="value" id="tank-label">未指定</div></div>
      <div class="mini"><div class="label">計算方式</div><div class="value" id="calc-label">未指定</div></div>
      <div class="mini"><div class="label">記載の全容量</div><div class="value" id="full-l">—</div></div>
      <div class="mini"><div class="label">記載の底板面以下</div><div class="value" id="bottom-l">—</div></div>
      <div class="mini"><div class="label">記載の中心深</div><div class="value" id="center-mm">—</div></div>
      <div class="mini" id="fixed-permm-card" hidden><div class="label">記載1mm当</div><div class="value" id="fixed-permm">—</div></div>
      <div class="mini"><div class="label">1mm当の切替</div><div class="value" id="boundary-label">—</div></div>
    </div>
  </section>
  <section class="card" id="segment-card" hidden>
    <div class="section-title">区間登録値</div>
    <div class="section-note" id="segment-note">注意がある区間だけ色を付けて表示します。</div>
    <div class="segment-table" id="segment-list"></div>
  </section>
  <section class="card">
    <div class="section-title">計算のしかた</div>
    <div class="row-list" id="calc-steps"></div>
    <div class="row-list" id="calc-example"></div>
  </section>
</div>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const tankNo = params.get('tankNo') || '';
  const tankLabel = params.get('tankLabel') || (tankNo ? `No.${tankNo}` : '未指定');
  const fullL = params.get('fullL') || '';
  const bottomL = params.get('bottomL') || '';
  const centerMm = params.get('centerMm') || '';
  const perMm = params.get('perMm') || '';
  const calcMode = params.get('calcMode') || 'fixed';
  const boundaryMode = params.get('boundaryMode') || 'none';
  const returnScreen = params.get('returnScreen') || 'tank2mm-screen';
  const segmentsParam = params.get('segments') || '';
  const segmentAlertsParam = params.get('segmentAlerts') || '';
  const auditStatusNote = params.get('auditStatusNote') || '';
  const auditHero = document.getElementById('audit-hero');
  const auditHeroBadge = document.getElementById('audit-hero-badge');
  const auditHeroTitle = document.getElementById('audit-hero-title');
  const auditHeroNote = document.getElementById('audit-hero-note');
  const activeGaugeParam = params.get('tm2activegauge') || (params.get('tm2mode') === 'gauge' ? (params.get('tm2gauge') || '') : '');
  const returnUrl = params.get('returnUrl') || '';
  const TM2_RETURN_KEY = 'sake-tools-tm2-return-v1';
  const activeGauge = Number(activeGaugeParam);
  const calcModeLabels = {
    fixed:'固定の1mm当で計算',
    segment_linear:'区間の前後をまっすぐ結んで計算',
    segment_recorded:'区間の記載1mm当をそのまま使う計算'
  };
  const boundaryLabels = {
    none:'固定1mm当のため切替なし',
    inclusive:'区間の端もその区間の値で計算',
    next:'1mm当は区間の終わりで次の値に切り替え'
  };
  const calcSteps = {
    fixed:[
      '中心深 − 検尺（空積深） = 入身深 を出します。',
      '底板面以下 ＋ 入身深 × 1mm当 で容量を出し、最後に1L未満を切り捨てます。'
    ],
    segment_linear:[
      '中心深 − 検尺（空積深） = 入身深 を出します。',
      'その入身深が入る区間を選び、その区間で容量を出して最後に1L未満を切り捨てます。'
    ],
    segment_recorded:[
      '中心深 − 検尺（空積深） = 入身深 を出します。',
      'その入身深が入る区間を選び、開始容量 ＋ 区間に入ってからのmm × 1mm当 で容量を出して最後に1L未満を切り捨てます。'
    ]
  };
  const segments = segmentsParam ? segmentsParam.split('|').map(row => {
    const [startDepth,endDepth,startL,endL,recordedPerMm] = row.split(',');
    return {
      startDepth:Number(startDepth),
      endDepth:Number(endDepth),
      startL:Number(startL),
      endL:Number(endL),
      recordedPerMm:Number(recordedPerMm)
    };
  }).filter(item => Number.isFinite(item.startDepth) && Number.isFinite(item.endDepth) && Number.isFinite(item.startL) && Number.isFinite(item.endL) && Number.isFinite(item.recordedPerMm)) : [];
  const segmentAlerts = (() => {
    if(!segmentAlertsParam) return [];
    try{
      const parsed = JSON.parse(decodeURIComponent(segmentAlertsParam));
      return Array.isArray(parsed) ? parsed : [];
    }catch{
      return [];
    }
  })();
  function normalizeAuditStatusNote(note){
    const normalized = String(note || '')
      .replace('詳細は登録値を見るで確認してください。', '黄色の行で確認してください。')
      .replace(/内部整合差/g, '計算上の差')
      .trim();
    const isTank128 = String(tankNo) === '128';
    const firstSegment = Array.isArray(segments) ? segments.find(item => Number(item.startDepth) === 0 && Number(item.endDepth) === 552 && Number(item.startL) === 662 && Number(item.endL) === 2982 && Number(item.recordedPerMm) === 4.393) : null;
    if(isTank128 && firstSegment && normalized.includes('計算上の終点容量と原票の終点容量に差がある')){
      const segmentContribution = Number((Number(firstSegment.endDepth) * Number(firstSegment.recordedPerMm)).toFixed(3));
      const calculated = Number((segmentContribution + Number(firstSegment.startL)).toFixed(3));
      const diff = Number((calculated - Number(firstSegment.endL)).toFixed(3));
      return `原票記載どおりで登録しています。第1帯先頭 0〜552mm は、552mm × 4.393L = ${segmentContribution.toLocaleString('ja-JP', { minimumFractionDigits:3, maximumFractionDigits:3 })}L、これに開始容量 662L を足すと ${calculated.toLocaleString('ja-JP', { minimumFractionDigits:3, maximumFractionDigits:3 })}L になります。一方、原票の終点容量は 2,982L です。差は約 ${diff.toLocaleString('ja-JP', { minimumFractionDigits:3, maximumFractionDigits:3 })}L あるため、この区間は要注意です。黄色の行で確認してください。`;
    }
    return normalized;
  }
  function getSegmentForLiquidDepth(liquidDepth){
    if(!Number.isFinite(liquidDepth)) return null;
    if(boundaryMode === 'next'){
      for(let i=0;i<segments.length;i++){
        const item = segments[i];
        const isLast = i === segments.length - 1;
        if(isLast){
          if(liquidDepth >= item.startDepth && liquidDepth <= item.endDepth) return item;
        }else if(liquidDepth >= item.startDepth && liquidDepth < item.endDepth){
          return item;
        }
      }
      return null;
    }
    return segments.find(item => liquidDepth >= item.startDepth && liquidDepth <= item.endDepth) || null;
  }
  function buildCurrentExample(){
    if(!Number.isFinite(activeGauge) || !Number.isFinite(Number(centerMm)) || activeGauge < 0 || activeGauge > Number(centerMm)) return '';
    const liquidDepth = Number(centerMm) - activeGauge;
    if(calcMode === 'fixed'){
      if(!Number.isFinite(Number(bottomL)) || !Number.isFinite(Number(fullL)) || !Number.isFinite(Number(centerMm)) || Number(centerMm) === 0) return `中心深 ${centerMm}mm − 検尺（空積深） ${activeGauge}mm = 入身深 ${liquidDepth}mm。底板面以下 ${bottomL}L ＋ ${liquidDepth}mm × 1mm当 で容量を出します。`;
      const formulaPerMm = Number.isFinite(Number(perMm)) ? Number(perMm) : ((Number(fullL) - Number(bottomL)) / Number(centerMm));
      const raw = Number(bottomL) + (liquidDepth * formulaPerMm);
      return `中心深 ${centerMm}mm − 検尺（空積深） ${activeGauge}mm = 入身深 ${liquidDepth}mm。底板面以下 ${bottomL}L ＋ ${liquidDepth}mm × 1mm当 ${formulaPerMm.toFixed(4)}L = ${raw.toFixed(5)}L、表示は ${Math.floor(raw)}Lです。`;
    }
    const segment = getSegmentForLiquidDepth(liquidDepth);
    if(!segment) return `中心深 ${centerMm}mm − 検尺（空積深） ${activeGauge}mm = 入身深 ${liquidDepth}mm。入身深が入る区間で容量を出します。`;
    const diffMm = liquidDepth - segment.startDepth;
    const segmentPerMm = Number(segment.recordedPerMm);
    const raw = Number(segment.startL) + (diffMm * segmentPerMm);
    return `中心深 ${centerMm}mm − 検尺（空積深） ${activeGauge}mm = 入身深 ${liquidDepth}mm。入身深 ${liquidDepth}mm は ${segment.startDepth}〜${segment.endDepth}mm の区間なので、開始容量 ${segment.startL}L（${segment.startDepth}mm）＋ ${diffMm}mm × 1mm当 ${segmentPerMm.toFixed(6)}L = ${raw.toFixed(5)}L、表示は ${Math.floor(raw)}Lです。`;
  }
  document.getElementById('page-title').textContent = tankNo ? `${tankLabel} / タンク登録詳細` : 'タンク登録詳細';
  document.getElementById('tank-label').textContent = tankLabel;
  document.getElementById('calc-label').textContent = calcModeLabels[calcMode] || calcModeLabels.fixed;
  document.getElementById('full-l').textContent = fullL ? `${fullL}L` : '—';
  document.getElementById('bottom-l').textContent = bottomL ? `${bottomL}L` : '—';
  document.getElementById('center-mm').textContent = centerMm ? `${centerMm}mm` : '—';
  document.getElementById('boundary-label').textContent = boundaryLabels[boundaryMode] || boundaryLabels.none;
  const fixedPerMmCard = document.getElementById('fixed-permm-card');
  const fixedPerMmValue = document.getElementById('fixed-permm');
  if(calcMode === 'fixed' && fixedPerMmCard && fixedPerMmValue && perMm){
    fixedPerMmCard.hidden = false;
    fixedPerMmValue.textContent = `${Number(perMm).toFixed(String(perMm).includes('.') ? String(perMm).split('.')[1].length : 0)}L`;
  }
  document.getElementById('calc-steps').innerHTML = (calcSteps[calcMode] || calcSteps.fixed).map(text => `<div class="row"><div class="row-text">${text}</div></div>`).join('');
  const calcExample = buildCurrentExample();
  document.getElementById('calc-example').innerHTML = calcExample ? `<div class="row"><div class="row-title">今の入力での計算</div><div class="row-text">${calcExample}</div></div>` : '';
  const normalizedAuditStatusNote = normalizeAuditStatusNote(auditStatusNote);
  const hasCaution = Boolean(normalizedAuditStatusNote || segmentAlerts.length);
  if(auditHero){
    auditHero.hidden = false;
    auditHero.className = `hero-status ${hasCaution ? 'is-caution' : 'is-ok'}`;
    if(auditHeroBadge) auditHeroBadge.textContent = hasCaution ? '注意あり' : '登録済み';
    if(auditHeroTitle) auditHeroTitle.textContent = hasCaution ? '確認時に注意が必要な区間があります。' : 'このタンクは登録値確認用の表示です。';
    if(auditHeroNote){
      auditHeroNote.hidden = !normalizedAuditStatusNote;
      auditHeroNote.textContent = normalizedAuditStatusNote || '';
    }
  }
  const segmentCard = document.getElementById('segment-card');
  const segmentList = document.getElementById('segment-list');
  const segmentNote = document.getElementById('segment-note');
  if(segmentCard && segmentList && segments.length){
    segmentCard.hidden = false;
    const hasSegmentCaution = segmentAlerts.length > 0;
    if(segmentNote) segmentNote.hidden = !hasSegmentCaution;
    segmentList.innerHTML = segments.map((item, index) => {
      const alert = segmentAlerts.find(entry => {
        if(Number.isFinite(entry.index)) return Number(entry.index) === index;
        return Number(entry.start_depth_mm) === Number(item.startDepth) && Number(entry.end_depth_mm) === Number(item.endDepth);
      }) || null;
      const rowClass = alert ? 'segment-row is-caution' : 'segment-row';
      const alertMarkup = alert && alert.note ? `<div class="segment-alert">${alert.note}</div>` : '';
      return `
      <div class="${rowClass}">
        <div class="segment-cell"><div class="segment-head"><span class="segment-band">第${index + 1}帯</span>入身深の範囲</div><div class="segment-value">${item.startDepth}〜${item.endDepth}mm</div></div>
        <div class="segment-cell"><div class="segment-head">開始容量</div><div class="segment-value">${item.startL}L</div></div>
        <div class="segment-cell"><div class="segment-head">終わり容量</div><div class="segment-value">${item.endL}L</div></div>
        <div class="segment-cell"><div class="segment-head">1mm当</div><div class="segment-value">${item.recordedPerMm.toFixed(3)}L</div></div>
        ${alertMarkup}
      </div>`;
    }).join('');
  }
  document.getElementById('backToTm2').addEventListener('click', function(){
    const payload = {
      screen: 'tank2mm-screen',
      groupKey: params.get('tm2group') || '',
      tankNo: params.get('tm2tank') || '',
      mode: params.get('tm2mode') === 'volume' ? 'volume' : 'gauge',
      inputValue: params.get('tm2input') || '',
      gaugeValue: params.get('tm2gauge') || '',
      volumeValue: params.get('tm2volume') || '',
      listOpen: (params.get('tm2list') || '') === '1',
      activeGauge: params.get('tm2activegauge') || '',
      scrollTargetGauge: params.get('tm2scrollgauge') || params.get('tm2activegauge') || ''
    };
    const backParams = new URLSearchParams();
    backParams.set('screen', returnScreen || 'tank2mm-screen');
    backParams.set('tm2return', '1');
    if(payload.groupKey) backParams.set('tm2group', payload.groupKey);
    if(payload.tankNo) backParams.set('tm2tank', payload.tankNo);
    if(payload.mode) backParams.set('tm2mode', payload.mode);
    if(payload.gaugeValue) backParams.set('tm2gauge', payload.gaugeValue);
    if(payload.volumeValue) backParams.set('tm2volume', payload.volumeValue);
    if(payload.listOpen) backParams.set('tm2list', '1');
    if(payload.activeGauge) backParams.set('tm2activegauge', payload.activeGauge);
    if(payload.scrollTargetGauge) backParams.set('tm2scrollgauge', payload.scrollTargetGauge);
    if(payload.inputValue) backParams.set('tm2input', payload.inputValue);
    const targetUrl = returnUrl || `./index.html?${backParams.toString()}`;
    try{ localStorage.setItem(TM2_RETURN_KEY, JSON.stringify(payload)); }catch{}
    try{ localStorage.setItem('sake-tools-last-screen-v2','tank2mm-screen'); }catch{}
    try{
      const raw = localStorage.getItem('sake-tools-ui-state-v1');
      const parsed = raw ? JSON.parse(raw) : {};
      parsed.screen = 'tank2mm-screen';
      parsed.tm2State = payload;
      localStorage.setItem('sake-tools-ui-state-v1', JSON.stringify(parsed));
    }catch{}
    try{ sessionStorage.setItem('sake-tools-force-screen-v1','tank2mm-screen'); }catch{}
    window.location.href = targetUrl;
  });
})();
</script>
</body>
</html>
