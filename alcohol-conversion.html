<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>アルコール換算 / 日本酒醸造 計算ツール</title>
  <link rel="stylesheet" href="./assets/common.css?v=20260516dark1">
  <link rel="stylesheet" href="./assets/alcohol-conversion.css?v=20260530hydromaster1">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="./index.html">← トップへ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">アルコール換算</span></div>
  </div>

  <main class="tool-body alcohol-conversion-body">
    <section class="screen-lead alcohol-conversion-lead">
      <h1>アルコール換算</h1>
    </section>

    <div class="wrapper alcohol-conversion-wrapper">
      <details class="common-info-toggle formula-toggle alcohol-conversion-formula">
        <summary><span class="toggle-label-closed">表確認の考え方を見る</span><span class="toggle-label-open">表確認の考え方を閉じる</span></summary>
        <section class="unit-bar" aria-label="式">
          <div class="unit-bar-formula">
            <span class="fml-main">測定度数 − 器差 = 補正後示度</span>
            <span class="fml-note">補正後示度と測定温度を横田表画像へ渡し、表の確認位置を合わせます。</span>
          </div>
        </section>
      </details>

      <section class="card alcohol-conversion-card" aria-label="アルコール換算入力">
        <div class="field-reset-row"><button class="back-btn reset-btn inline-reset-btn" id="alcohol-conversion-reset" type="button">入力値をリセット</button></div>

        <div class="group"><div class="group-title">測定</div>
          <div class="alcohol-conversion-field-grid">
            <label class="alcohol-conversion-field"><span>測定度数</span><div class="alcohol-conversion-input-wrap"><input id="alcohol-conversion-reading" inputmode="decimal" min="0" max="100" placeholder="例：15.5" step="0.1" type="number"><span class="iunit">%</span></div></label>
            <label class="alcohol-conversion-field"><span>測定温度</span><div class="alcohol-conversion-input-wrap"><input id="alcohol-conversion-temp" inputmode="decimal" min="0" max="35" placeholder="例：10.0" step="0.1" type="number"><span class="iunit">℃</span></div></label>
          </div>
        </div>

        <div class="group"><div class="group-title">使用浮標</div>
          <div class="alcohol-conversion-field-grid single">
            <label class="alcohol-conversion-field"><span>使用浮標</span><div class="alcohol-conversion-input-wrap select-wrap"><select id="alcohol-conversion-hydrometer"></select></div></label>
          </div>
        </div>

        <details class="common-info-toggle alcohol-conversion-hydrometer-editor" id="alcohol-conversion-hydrometer-editor">
          <summary><span class="toggle-label-closed">浮標・器差設定を編集</span><span class="toggle-label-open">浮標・器差設定を閉じる</span></summary>
          <div class="alcohol-conversion-hydrometer-editor-body">
            <p class="alcohol-conversion-hydrometer-editor-note">選択中の浮標について、浮標名・使用範囲・検定点%・器差補正%を保存します。検定点と器差補正の両方が入力された行だけ、通常画面の器差候補に出ます。</p>
            <div class="alcohol-conversion-editor-grid alcohol-conversion-editor-main-grid" aria-label="浮標設定入力">
              <label class="alcohol-conversion-editor-field alcohol-conversion-editor-field-wide"><span>浮標名</span><input id="alcohol-conversion-editor-label" type="text" autocomplete="off" placeholder="例：15〜20"></label>
              <label class="alcohol-conversion-editor-field"><span>下限%</span><input id="alcohol-conversion-editor-min" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-field"><span>上限%</span><input id="alcohol-conversion-editor-max" inputmode="decimal" step="0.1" type="number"></label>
            </div>
            <div class="alcohol-conversion-editor-points" aria-label="器差補正設定">
              <div class="alcohol-conversion-editor-head">検定点%</div>
              <div class="alcohol-conversion-editor-head">器差補正%</div>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-point" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-kisa" inputmode="decimal" step="0.01" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-point" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-kisa" inputmode="decimal" step="0.01" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-point" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-kisa" inputmode="decimal" step="0.01" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-point" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-kisa" inputmode="decimal" step="0.01" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-point" inputmode="decimal" step="0.1" type="number"></label>
              <label class="alcohol-conversion-editor-cell"><input class="alcohol-conversion-editor-kisa" inputmode="decimal" step="0.01" type="number"></label>
            </div>
            <div class="alcohol-conversion-editor-actions">
              <button class="back-btn action-forward-btn" id="alcohol-conversion-editor-save" type="button">この浮標を保存</button>
              <button class="back-btn" id="alcohol-conversion-editor-add" type="button">新しい浮標として追加</button>
              <button class="back-btn reset-btn" id="alcohol-conversion-editor-delete" type="button">この浮標を削除</button>
              <button class="back-btn reset-btn" id="alcohol-conversion-editor-defaults" type="button">初期浮標に戻す</button>
            </div>
            <div class="alcohol-conversion-editor-status" id="alcohol-conversion-editor-status" aria-live="polite"></div>
          </div>
        </details>

        <div class="group"><div class="group-title">器差を選ぶ</div>
          <div class="candidate-panel" id="alcohol-conversion-kisa-candidates" aria-live="polite"></div>
          <input id="alcohol-conversion-kisa" type="hidden">
        </div>

        <div class="intermediate-card alcohol-conversion-corrected-card" id="alcohol-conversion-corrected-card" hidden>
          <div class="result-label">補正後示度</div>
          <div class="result-value intermediate"><span id="alcohol-conversion-corrected">—</span><span class="result-unit">%</span></div>
        </div>

        <div class="err" id="alcohol-conversion-error" aria-live="polite" hidden></div>


        <section class="compact-tools-panel alcohol-conversion-actions" aria-label="アルコール換算の操作">
          <div class="calc-main-actions">
            <a class="back-btn action-forward-btn" id="alcohol-conversion-open-table" href="./docs-view.html">横田表で確認する →</a>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="./assets/alcohol-conversion.js?v=20260530hydromaster1"></script>
  <script src="./assets/theme.js?v=20260516dark1" defer></script>
</body>
</html>
