<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>アルコール換算 / 日本酒醸造 計算ツール</title>
  <link rel="stylesheet" href="./assets/common.css?v=20260516dark1">
  <link rel="stylesheet" href="./assets/alcohol-conversion.css?v=20260516kisa5">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="./index.html">← トップへ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">アルコール換算</span></div>
  </div>

  <main class="tool-body alcohol-conversion-body">
    <section class="screen-lead alcohol-conversion-lead">
      <h1>アルコール換算</h1>
    </section>

    <div class="wrapper alcohol-conversion-wrapper">
      <details class="common-info-toggle formula-toggle alcohol-conversion-formula">
        <summary><span class="toggle-label-closed">計算式・考え方を見る</span><span class="toggle-label-open">計算式・考え方を閉じる</span></summary>
        <section class="unit-bar" aria-label="式">
          <div class="unit-bar-formula">
            <span class="fml-main">ρ = A[1] + Σ A[k]・p^(k−1) + Σ B[k]・(t−20)^k + ΣΣ C[i][k]・p^k・(t−20)^i</span>
            <span class="fml-note">この画面では、上式系から作られたアルコール分温度補正表を内部表として使い、補正後示度と測定温度の間を補間します。</span>
          </div>
        </section>
      </details>

      <section class="card alcohol-conversion-card" aria-label="アルコール換算入力">
        <div class="field-reset-row"><button class="back-btn reset-btn inline-reset-btn" id="alcohol-conversion-reset" type="button">入力値をリセット</button></div>

        <div class="group"><div class="group-title">測定</div>
          <div class="alcohol-conversion-field-grid">
            <label class="alcohol-conversion-field"><span>測定度数</span><div class="alcohol-conversion-input-wrap"><input id="alcohol-conversion-reading" inputmode="decimal" min="0" max="100" placeholder="例：15.5" step="0.1" type="number"><span class="iunit">%</span></div></label>
            <label class="alcohol-conversion-field"><span>測定温度</span><div class="alcohol-conversion-input-wrap"><input id="alcohol-conversion-temp" inputmode="decimal" min="0" max="35" placeholder="例：10.0" step="0.1" type="number"><span class="iunit">℃</span></div></label>
          </div>
        </div>

        <div class="group"><div class="group-title">使用浮標</div>
          <div class="alcohol-conversion-field-grid single">
            <label class="alcohol-conversion-field"><span>使用浮標</span><div class="alcohol-conversion-input-wrap select-wrap"><select id="alcohol-conversion-hydrometer"></select></div></label>
          </div>
        </div>

        <div class="group"><div class="group-title">器差を選ぶ</div>
          <div class="candidate-panel" id="alcohol-conversion-kisa-candidates" aria-live="polite"></div>
          <div class="alcohol-conversion-field-grid single">
            <label class="alcohol-conversion-field"><span>器差</span><div class="alcohol-conversion-input-wrap"><input id="alcohol-conversion-kisa" inputmode="decimal" placeholder="例：-0.05" step="0.01" type="number"><span class="iunit">%</span></div></label>
          </div>
        </div>

        <div class="intermediate-card alcohol-conversion-corrected-card" id="alcohol-conversion-corrected-card" hidden>
          <div class="result-label">補正後示度</div>
          <div class="result-value intermediate"><span id="alcohol-conversion-corrected">—</span><span class="result-unit">%</span></div>
        </div>

        <div class="result-card alcohol-conversion-result-card" id="alcohol-conversion-result" hidden>
          <div class="result-title">計算結果</div>
          <div class="alcohol-conversion-primary-result">
            <div class="result-label">15℃補正後アルコール分</div>
            <div class="result-value primary"><span id="alcohol-conversion-final">—</span><span class="result-unit">%</span></div>
          </div>
        </div>
        <div class="err" id="alcohol-conversion-error" aria-live="polite" hidden></div>


        <section class="compact-tools-panel alcohol-conversion-actions" aria-label="アルコール換算の操作">
          <div class="calc-main-actions">
            <a class="back-btn action-forward-btn" id="alcohol-conversion-open-table" href="./docs-view.html">表で見る →</a>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script src="./assets/alcohol-conversion.js?v=20260516kisa5"></script>
  <script src="./assets/theme.js?v=20260516dark1" defer></script>
</body>
</html>
