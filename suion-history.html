<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>水温温度履歴 / 日本酒醸造 計算ツール</title>
  <link rel="stylesheet" href="./assets/common.css">
  <link rel="stylesheet" href="./assets/mix-history.css">
  <link rel="stylesheet" href="./assets/history-page.css">
</head>
<body data-history-tool="suion">
  <div class="tool-nav">
    <a class="back-btn" id="history-back-link" href="./suion.html">← 水温温度計算へ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title" id="history-nav-title">水温温度履歴</span></div>
  </div>

  <main class="tool-body">
    <section class="screen-lead">
      <h1 id="history-page-title">水温温度履歴</h1>
      <p id="history-page-lead">方式を選び、保存した計算結果を確認します。</p>
    </section>

    <div class="wrapper history-wrapper">
      <section class="history-action-panel" aria-label="履歴の操作">
        <div class="history-action-title-row">
          <div>
            <h2 id="history-action-title">履歴の操作</h2>
            <p>方式を選んで履歴を確認します。入力欄へ戻す操作をしても、履歴保存・2mm表候補作成・共有は自動実行しません。</p>
          </div>
          <span class="inline-tools-badge" id="history-badge">専用履歴</span>
        </div>

        <div class="history-action-controls history-action-controls-single">
          <div class="history-filter-field">
            <label for="history-mode-filter">表示する方式</label>
            <select id="history-mode-filter"></select>
          </div>
        </div>

        <div class="history-action-statuses">
          <p id="history-filter-status">—</p>
        </div>
      </section>

      <section class="history-list-section" aria-label="履歴一覧">
        <div class="history-list-header">
          <div>
            <h2 id="history-list-title">履歴</h2>
            <p id="history-count">—</p>
          </div>
        </div>
        <div class="history-empty" id="history-empty" hidden>まだ履歴はありません。</div>
        <div class="history-list" id="history-list"></div>
      </section>
    </div>
  </main>

  <script src="./assets/history-page.js"></script>
</body>
</html>
