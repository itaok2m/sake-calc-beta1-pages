<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>計算機 / 日本酒醸造 計算ツール</title>
  <link rel="stylesheet" href="./assets/common.css">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="./index.html">← トップへ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">計算機</span></div>
  </div>

  <main class="tool-body calculators-body">
    <section class="screen-lead">
      <h1>計算機</h1>
      <p>使う計算を選んでください。履歴は各計算機の画面内から確認します。</p>
    </section>

    <div class="wrapper">
      <section class="calc-list" aria-label="計算機一覧">
        <a class="calc-list-row" href="./mix.html">
          <span class="calc-list-main"><span class="calc-list-title">混合計算</span><span class="calc-list-desc">配合・成分を混ぜた結果を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./water.html">
          <span class="calc-list-main"><span class="calc-list-title">割水計算</span><span class="calc-list-desc">目標成分までの加水量を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./alcohol.html">
          <span class="calc-list-main"><span class="calc-list-title">アルコール添加計算</span><span class="calc-list-desc">添加量と添加後数量を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./suion.html">
          <span class="calc-list-main"><span class="calc-list-title">水温温度計算</span><span class="calc-list-desc">水同士の温度調整</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./ice.html">
          <span class="calc-list-main"><span class="calc-list-title">氷投入量計算</span><span class="calc-list-desc">氷で汲水を冷やす計算</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./moto.html">
          <span class="calc-list-main"><span class="calc-list-title">酛仕込温度計算</span><span class="calc-list-desc">酛仕込み温度を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./jumai.html">
          <span class="calc-list-main"><span class="calc-list-title">醪仕込温度計算</span><span class="calc-list-desc">醪仕込み温度を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
        <a class="calc-list-row" href="./ekisu.html">
          <span class="calc-list-main"><span class="calc-list-title">エキス分計算</span><span class="calc-list-desc">醪中の発酵管理指標を確認</span></span>
          <span class="calc-list-arrow" aria-hidden="true">＞</span>
        </a>
      </section>
    </div>
  </main>

  <script id="sake-html-split-pwa-register">
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
