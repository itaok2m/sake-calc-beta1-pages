<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f4257">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <title>醪仕込温度計算 / 日本酒醸造 計算ツール</title>
  <link rel="stylesheet" href="./assets/common.css">
  <link rel="stylesheet" href="./assets/temperature-brew.css">
</head>
<body>
  <div class="tool-nav">
    <a class="back-btn" href="./index.html">← トップへ戻る</a>
    <div class="tool-nav-place"><span class="tool-nav-title">醪仕込温度計算</span></div>
  </div>
  <main class="tool-body">
    <section class="screen-lead"><h1>醪仕込温度計算</h1><p>水麹温度と工程（添・仲・留）をもとに、使う蒸米温度を一覧で確認できます。</p></section>
    <div class="wrapper">
      <section class="section-subnav sublevel-nav" aria-label="計算式表示"><span class="section-subnav-title">計算式表示</span></section>
      <section class="unit-bar" aria-label="式"><div class="unit-bar-formula"><span class="fml-main">蒸米温度 ＝（仕込予定温度 − 水麹温度）× F ＋ 水麹温度</span></div></section>
      <section class="card" aria-label="醪仕込温度計算入力">
        <div class="group"><div class="group-title">水麹温度・工程を入力</div>
          <div class="temp-field-grid"><label class="temp-field"><span>水麹温度</span><div class="temp-input-wrap"><input id="jumai-water-koji-temp" inputmode="decimal" placeholder="例：8.0" step="0.1" type="number"><span class="iunit">℃</span></div></label><label class="temp-field"><span>工程（F値）</span><div class="temp-input-wrap"><select id="jumai-factor"><option value="5">添・仲（F = 5）</option><option value="6">留（F = 6）</option></select></div></label></div>
        </div>
        <div class="field-reset-row"><button class="back-btn reset-btn inline-reset-btn" id="jumai-reset" type="button">入力値をリセット</button></div>
        <section class="result-card" id="jumai-result" hidden><div class="result-title">蒸米温度一覧</div><div class="temp-table-wrap"><table class="temp-table"><thead><tr><th>仕込予定温度</th><th>蒸米温度</th></tr></thead><tbody id="jumai-body"></tbody></table></div><p class="temp-note">※ 仕込予定温度 6.0〜15.0℃（0.5℃刻み）の蒸米温度を一覧表示します。</p></section>
        <div class="err" id="jumai-error" hidden></div>
      </section>
    </div>
  </main>
  <script src="./assets/jumai.js"></script>
</body>
</html>
